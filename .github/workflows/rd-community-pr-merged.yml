name: R&D Community — PR Merged

# Fires when a PR is merged on humanjudge/grandjury. If the PR added a file
# under /challenges/*.md (= R&D community application submission), we:
#   1. Post a welcome comment on the PR with Discord verification instructions
#   2. POST to humanjudge.com to update the applicant's profile.rd_pr_merged_at
#      (this is the gate the Discord verification bot checks)
#
# Required repo secret:
#   HUMANJUDGE_WEBHOOK_SECRET — shared with backend env var GITHUB_WEBHOOK_SECRET.
#                               Used for HMAC-SHA256 signature on the webhook payload.

on:
  pull_request_target:
    types: [closed]

jobs:
  rd-community-onboard:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check if R&D community application PR
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const isRdApplication = files.data.some(f =>
              f.filename.startsWith('challenges/')
                && f.filename.endsWith('.md')
                && f.filename !== 'challenges/README.md'
                && f.filename !== 'challenges/TEMPLATE.md'
                && f.status === 'added'
            );
            core.setOutput('is_rd_application', isRdApplication ? 'true' : 'false');
            if (isRdApplication) {
              const author = context.payload.pull_request.user.login;
              core.info(`R&D community application PR detected — author @${author}`);
            }

      - name: Comment on merged PR
        if: steps.check.outputs.is_rd_application == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const body = [
              `## Welcome to the HumanJudge R&D community, @${author}`,
              '',
              'Your application is merged. Here\'s how to claim your Discord access:',
              '',
              '1. **Join Discord** — invite link will be posted in the pinned thread of the community channel',
              '2. **Land in `#verify`** — only channel visible to new joiners',
              '3. **Click "Verify with my email"** and enter the email on your HumanJudge profile',
              '4. **Granted `Builder` role** automatically — unlocks the stream channels',
              '',
              '_The verification bot checks: your email exists on HumanJudge, your `builder` role is set, and this PR was merged. All three must match._',
              '',
              'Pick a stream and start engaging. See you in `#general`.',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Notify backend (update rd_pr_merged_at)
        if: steps.check.outputs.is_rd_application == 'true'
        env:
          WEBHOOK_SECRET: ${{ secrets.HUMANJUDGE_WEBHOOK_SECRET }}
          GH_USERNAME: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          set -euo pipefail

          PAYLOAD=$(jq -nc \
            --arg gh_username "$GH_USERNAME" \
            --argjson pr_number "$PR_NUMBER" \
            --arg pr_url "$PR_URL" \
            --arg merged_at "$MERGED_AT" \
            '{github_username: $gh_username, pr_number: $pr_number, pr_url: $pr_url, merged_at: $merged_at}')

          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')

          echo "Posting to backend with author @$GH_USERNAME (PR #$PR_NUMBER)"

          HTTP_CODE=$(curl -sS -o /tmp/webhook-response.json -w "%{http_code}" \
            -X POST https://humanjudge.com/api/v1/webhooks/github/pr-merged \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIGNATURE" \
            -H "User-Agent: humanjudge-grandjury-action" \
            -d "$PAYLOAD")

          echo "Backend response code: $HTTP_CODE"
          cat /tmp/webhook-response.json
          echo ""

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Backend webhook returned $HTTP_CODE — applicant may need manual gating in Discord verification"
            exit 0
          fi
